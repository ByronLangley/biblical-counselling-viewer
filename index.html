<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Scripture Reference for Counseling Youth</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.min.mjs" type="module"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f0eb;
            color: #2c2c2c;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: #3a2d23;
            color: #f5f0eb;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            flex-shrink: 0;
            z-index: 10;
        }

        header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        header p {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .header-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: #fff;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 10px 14px;
            background: #f8f5f1;
            border-bottom: 1px solid #e5ddd5;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }

        .sidebar-header h2 {
            font-size: 0.9rem;
            color: #5a4a3a;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .search-box {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d5cdc5;
            border-radius: 6px;
            font-size: 16px; /* prevents iOS zoom on focus */
            outline: none;
            background: #fff;
        }

        .search-box:focus {
            border-color: #8b6f4e;
            box-shadow: 0 0 0 2px rgba(139,111,78,0.15);
        }

        .topic-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 4px 0;
        }

        .topic-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f0ebe5;
            transition: background 0.15s;
            gap: 10px;
            -webkit-tap-highlight-color: rgba(139,111,78,0.15);
        }

        .topic-item:hover {
            background: #f8f5f1;
        }

        .topic-item:active {
            background: #ede5da;
        }

        .topic-item.active {
            background: #ede5da;
            border-left: 3px solid #8b6f4e;
        }

        .topic-item.unavailable {
            opacity: 0.45;
            cursor: default;
        }

        .topic-item.unavailable:hover,
        .topic-item.unavailable:active {
            background: transparent;
        }

        .topic-name {
            flex: 1;
            font-size: 0.92rem;
        }

        .topic-page {
            font-size: 0.78rem;
            color: #999;
            flex-shrink: 0;
        }

        .topic-item.unavailable .topic-page {
            color: #c99;
            font-style: italic;
        }

        /* PDF Viewer */
        .viewer {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #4a4a4a;
            position: relative;
        }

        .viewer-toolbar {
            display: none;
            background: #3a3a3a;
            color: #eee;
            padding: 8px 12px;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            font-size: 0.85rem;
        }

        .viewer-toolbar.visible {
            display: flex;
        }

        .viewer-toolbar .back-btn {
            background: none;
            border: 1px solid #777;
            color: #eee;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .viewer-toolbar .back-btn:active {
            background: #555;
        }

        .viewer-toolbar .topic-title {
            flex: 1;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .viewer-toolbar .page-nav {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .viewer-toolbar .page-nav button {
            background: none;
            border: 1px solid #777;
            color: #eee;
            width: 32px;
            height: 32px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .viewer-toolbar .page-nav button:active {
            background: #555;
        }

        .viewer-toolbar .page-nav button:disabled {
            opacity: 0.3;
            cursor: default;
        }

        .viewer-toolbar .page-info {
            min-width: 60px;
            text-align: center;
            font-size: 0.8rem;
        }

        .pdf-container {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px;
            gap: 8px;
        }

        .pdf-container canvas {
            max-width: 100%;
            height: auto;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
            background: #fff;
        }

        .viewer-placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            color: #8b7b6b;
            padding: 40px;
            text-align: center;
            background: #e8e0d8;
        }

        .viewer-placeholder .icon {
            font-size: 3rem;
        }

        .viewer-placeholder p {
            font-size: 1rem;
            max-width: 400px;
            line-height: 1.6;
        }

        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: #ccc;
            font-size: 0.95rem;
            gap: 10px;
        }

        .loading-spinner::before {
            content: '';
            width: 24px;
            height: 24px;
            border: 3px solid #666;
            border-top-color: #ccc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Category dividers */
        .category-divider {
            padding: 6px 16px;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #a09080;
            background: #f8f5f1;
            border-bottom: 1px solid #ede5da;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        /* Desktop: side-by-side layout */
        @media (min-width: 769px) {
            .viewer-toolbar .back-btn {
                display: none;
            }
        }

        /* Mobile: stacked views */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: absolute;
                inset: 0;
                z-index: 5;
                transition: transform 0.25s ease;
            }

            .sidebar.hidden {
                transform: translateX(-100%);
            }

            .viewer {
                position: absolute;
                inset: 0;
                z-index: 4;
            }

            .viewer-toolbar .back-btn {
                display: block;
            }

            header h1 {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-icon">&#x1F4D6;</div>
        <div>
            <h1>Quick Scripture Reference for Counseling Youth</h1>
            <p>Keith R. Miller &amp; Patricia A. Miller</p>
        </div>
    </header>

    <div class="main-container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Subject Guide</h2>
                <input type="text" class="search-box" id="searchBox" placeholder="Search topics...">
            </div>
            <div class="topic-list" id="topicList"></div>
        </div>
        <div class="viewer" id="viewer">
            <div class="viewer-toolbar" id="toolbar">
                <button class="back-btn" id="backBtn">&#8592; Topics</button>
                <span class="topic-title" id="topicTitle"></span>
                <div class="page-nav">
                    <button id="prevPage">&#8249;</button>
                    <span class="page-info" id="pageInfo"></span>
                    <button id="nextPage">&#8250;</button>
                </div>
            </div>
            <div class="viewer-placeholder" id="placeholder">
                <div class="icon">&#x1F4D6;</div>
                <p>Select a topic from the Subject Guide to jump directly to that section in the book.</p>
            </div>
            <div class="pdf-container" id="pdfContainer" style="display:none;"></div>
        </div>
    </div>

            { name: 'Spiritual Warfare', page: 267 },
            { name: 'Sports', page: 271 },
            { name: 'Stealing', page: 274 },
            { name: 'Subjectivity', page: 232, note: 'See Selfishness/Subjectivity' },
            { name: 'Submission', page: 33, note: 'See Authority/Rebellion/Submission' },
            { name: 'Substance Abuse', page: 276 },
            { name: 'Success', page: 94, note: 'See Failure/Success' },
            { name: 'Suffering', page: 282 },
            { name: 'Suicide', page: 286 },
            { divider: 'T' },
            { name: 'Temptation', page: 290 },
            { name: 'Terrorism', page: 97, note: 'See Fear/Safety/Terrorism' },
            { name: 'Thought Life', page: 294 },
            { name: 'Time Management', page: 297 },
            { name: 'Trust', page: 298 },
            { name: 'Truthfulness', page: null, note: 'Missing from PDF export' },
            { name: 'TV', page: 89, note: 'See Entertainment' },
            { divider: 'U' },
            { name: 'Unwed Pregnancy', page: 302 },
            { divider: 'V' },
            { name: 'Violence', page: 101, note: 'See Fighting/Violence' },
            { divider: 'W' },
            { name: 'Words That Hurt', page: 305 },
            { name: 'Work Ethic', page: 308 },
            { name: 'Worry', page: 311 },
        ];

        // DOM refs
        const topicList = document.getElementById('topicList');
        const searchBox = document.getElementById('searchBox');
        const viewer = document.getElementById('viewer');
        const placeholderEl = document.getElementById('placeholder');
        const pdfContainer = document.getElementById('pdfContainer');
        const toolbar = document.getElementById('toolbar');
        const backBtn = document.getElementById('backBtn');
        const topicTitle = document.getElementById('topicTitle');
        const pageInfo = document.getElementById('pageInfo');
        const prevPageBtn = document.getElementById('prevPage');
        const nextPageBtn = document.getElementById('nextPage');
        const sidebarEl = document.getElementById('sidebar');

        let activeItem = null;
        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;
        let rendering = false;
        const PAGES_TO_RENDER = 5; // render a batch of pages from the starting point

        // Load PDF.js
        const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.min.mjs');
        pdfjsLib.GlobalWorkerOptions.workerSrc = WORKER_SRC;

        // Load the PDF document once
        let pdfLoadPromise = null;
        async function getPdfDoc() {
            if (pdfDoc) return pdfDoc;
            if (!pdfLoadPromise) {
                pdfLoadPromise = pdfjsLib.getDocument(PDF_FILE).promise;
            }
            pdfDoc = await pdfLoadPromise;
            totalPages = pdfDoc.numPages;
            return pdfDoc;
        }

        async function renderPages(startPage, count) {
            if (rendering) return;
            rendering = true;

            pdfContainer.innerHTML = '';
            pdfContainer.style.display = 'flex';
            placeholderEl.style.display = 'none';

            // Show loading
            const loadingEl = document.createElement('div');
            loadingEl.className = 'loading-spinner';
            loadingEl.textContent = 'Loading...';
            pdfContainer.appendChild(loadingEl);

            try {
                const doc = await getPdfDoc();
                pdfContainer.innerHTML = '';

                const end = Math.min(startPage + count - 1, doc.numPages);
                currentPage = startPage;
                updatePageNav();

                const containerWidth = pdfContainer.clientWidth - 16;

                for (let p = startPage; p <= end; p++) {
                    const page = await doc.getPage(p);
                    const viewport = page.getViewport({ scale: 1 });
                    const scale = Math.min(containerWidth / viewport.width, 2.5);
                    const scaledViewport = page.getViewport({ scale });

                    const canvas = document.createElement('canvas');
                    canvas.width = scaledViewport.width;
                    canvas.height = scaledViewport.height;

                    const ctx = canvas.getContext('2d');
                    await page.render({ canvasContext: ctx, viewport: scaledViewport }).promise;

                    pdfContainer.appendChild(canvas);
                }
            } catch (err) {
                pdfContainer.innerHTML = '<div class="loading-spinner" style="animation:none">Failed to load PDF. Please try again.</div>';
                console.error(err);
            }

            rendering = false;
        }

        function updatePageNav() {
            const end = Math.min(currentPage + PAGES_TO_RENDER - 1, totalPages);
            pageInfo.textContent = currentPage + '-' + end + ' / ' + totalPages;
            prevPageBtn.disabled = currentPage <= 1;
            nextPageBtn.disabled = currentPage + PAGES_TO_RENDER > totalPages;
        }

        function isMobile() {
            return window.innerWidth <= 768;
        }

        function showViewer(topicName) {
            toolbar.classList.add('visible');
            topicTitle.textContent = topicName;
            if (isMobile()) {
                sidebarEl.classList.add('hidden');
            }
        }

        function showSidebar() {
            sidebarEl.classList.remove('hidden');
            if (isMobile()) {
                toolbar.classList.remove('visible');
                pdfContainer.style.display = 'none';
                placeholderEl.style.display = 'flex';
            }
        }

        // Render topic list
        function renderTopics(filter = '') {
            topicList.innerHTML = '';
            const filterLower = filter.toLowerCase();

            topics.forEach((item, idx) => {
                if (item.divider) {
                    if (!filter) {
                        const div = document.createElement('div');
                        div.className = 'category-divider';
                        div.textContent = item.divider;
                        topicList.appendChild(div);
                    }
                    return;
                }

                if (filter && !item.name.toLowerCase().includes(filterLower)) return;

                const el = document.createElement('div');
                el.className = 'topic-item' + (item.page === null ? ' unavailable' : '');
                el.dataset.idx = idx;

                const nameSpan = document.createElement('span');
                nameSpan.className = 'topic-name';
                nameSpan.textContent = item.name;

                const pageSpan = document.createElement('span');
                pageSpan.className = 'topic-page';
                if (item.page === null) {
                    pageSpan.textContent = 'N/A';
                    el.title = item.note || 'Not available in this PDF export';
                } else {
                    pageSpan.textContent = 'p. ' + item.page;
                    if (item.note) el.title = item.note;
                }

                el.appendChild(nameSpan);
                el.appendChild(pageSpan);

                if (item.page !== null) {
                    el.addEventListener('click', () => {
                        if (activeItem) activeItem.classList.remove('active');
                        el.classList.add('active');
                        activeItem = el;

                        showViewer(item.name);
                        renderPages(item.page, PAGES_TO_RENDER);
                    });
                }

                topicList.appendChild(el);
            });
        }

        // Event listeners
        searchBox.addEventListener('input', (e) => {
            renderTopics(e.target.value.trim());
        });

        backBtn.addEventListener('click', showSidebar);

        prevPageBtn.addEventListener('click', () => {
            const newPage = Math.max(1, currentPage - PAGES_TO_RENDER);
            renderPages(newPage, PAGES_TO_RENDER);
        });

        nextPageBtn.addEventListener('click', () => {
            const newPage = currentPage + PAGES_TO_RENDER;
            if (newPage <= totalPages) {
                renderPages(newPage, PAGES_TO_RENDER);
            }
        });

        // Start pre-loading the PDF in the background
        getPdfDoc();

        // Initial render
        renderTopics();
    </script>
</body>
</html>
